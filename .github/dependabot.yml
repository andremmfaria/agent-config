version: 2
updates:
  # Keep GitHub Actions versions current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  # Keep pre-commit hook revs (in .pre-commit-config.yaml) current.
  # Dependabot supports this natively as of 2026-03-10.
  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
