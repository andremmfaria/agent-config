name: validate-config

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Validate config files and agent frontmatter
        run: |
          python3 scripts/validate-config.py
