name: shellcheck

on:
  push:
  pull_request:
  workflow_dispatch: {}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck scripts/*.sh openclaw/apply-agents.sh claude/apply-agents.sh
